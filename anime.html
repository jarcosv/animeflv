<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AnimeFLV - Ficha de Anime">
  <title>Anime - AnimeFLV</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: #1a1a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; line-height: 1.6; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #2a2a2a; }
::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 4px; }

.navbar { background: #242424; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 1000; padding: 12px 30px; }
.navbar-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 40px; }
.navbar-logo img { height: 40px; }
.navbar-links { display: flex; gap: 30px; flex: 1; justify-content: flex-end; }
.nav-link { color: #aaa; font-size: 13px; font-weight: 500; text-decoration: none; background: 0; border: 0; cursor: pointer; transition: color 0.2s; }
.nav-link:hover, .nav-link.active { color: #0ea5e9; }
.navbar-search { display: flex; position: relative; align-items: center; margin-left: auto; }
.search-input { background: #1f1f1f; color: #fff; border: 1px solid #333; height: 32px; padding: 0 12px 0 36px; border-radius: 20px; font-size: 12px; width: 150px; }
.search-input:focus { outline: 0; border-color: #0ea5e9; }
.search-button { position: absolute; left: 10px; background: 0; color: #0ea5e9; border: 0; cursor: pointer; font-size: 14px; padding: 0; }
.login-btn { color: #fff; font-size: 12px; font-weight: 600; background: linear-gradient(135deg, #0ea5e9, #06b6d4); border: 0; padding: 8px 16px; border-radius: 4px; cursor: pointer; }

.footer { background: #1a1a1a; border-top: 1px solid #2a2a2a; padding: 30px 20px; margin-top: 40px; text-align: center; color: #666; font-size: 12px; }

.page-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }

.breadcrumb { font-size: 12px; color: #aaa; margin-bottom: 20px; }
.breadcrumb a { color: #0ea5e9; text-decoration: none; cursor: pointer; }
.breadcrumb a:hover { text-decoration: underline; }

/* HEADER DEL ANIME */
.anime-header { display: grid; grid-template-columns: 220px 1fr; gap: 24px; margin-bottom: 30px; }
.anime-poster { width: 220px; aspect-ratio: 3/4; border-radius: 6px; overflow: hidden; background: #242424; }
.anime-poster img { width: 100%; height: 100%; object-fit: cover; }
.anime-header-info { display: flex; flex-direction: column; justify-content: center; gap: 12px; }
.anime-title-main { font-size: 28px; font-weight: 700; }
.anime-type-badge { display: inline-block; background: #0ea5e9; color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 3px; width: fit-content; }
.anime-synopsis { color: #aaa; font-size: 13px; line-height: 1.7; max-width: 700px; }
.anime-meta-row { display: flex; gap: 14px; flex-wrap: wrap; }
.anime-action-btn { background: #0ea5e9; color: #fff; border: 0; padding: 10px 22px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: background 0.2s; }
.anime-action-btn:hover { background: #06b6d4; }

/* SECCION EPISODIOS */
.episodes-section { background: #242424; border-radius: 4px; overflow: hidden; }
.episodes-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: #1a1a1a; border-bottom: 2px solid #0ea5e9; }
.episodes-header-title { color: #0ea5e9; font-size: 15px; font-weight: 700; }
.episodes-count { background: #0ea5e9; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 10px; }
.episodes-list { display: flex; flex-direction: column; }
.episode-row { display: flex; align-items: center; gap: 14px; padding: 12px 20px; text-decoration: none; color: #fff; border-bottom: 1px solid #1a1a1a; transition: background 0.2s; }
.episode-row:hover { background: #1a1a1a; }
.episode-row-thumb { width: 90px; height: 60px; border-radius: 4px; object-fit: cover; background: #1a1a1a; flex-shrink: 0; }
.episode-row-info { flex: 1; min-width: 0; }
.episode-row-title { font-size: 14px; font-weight: 600; }
.episode-row-sub { font-size: 12px; color: #888; margin-top: 2px; }
.episode-row-play { color: #0ea5e9; font-size: 20px; flex-shrink: 0; }
.episodes-empty { padding: 30px 20px; text-align: center; color: #666; font-size: 13px; }
.loading { text-align: center; padding: 40px; color: #666; }

@media (max-width: 700px) {
  .anime-header { grid-template-columns: 1fr; }
  .anime-poster { width: 160px; margin: 0 auto; }
  .anime-header-info { align-items: center; text-align: center; }
  .navbar-links { display: none; }
}
  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <a href="/"><img src="/image.png" alt="AnimeFLV" style="height:40px;"></a>
      </div>
      <div class="navbar-links" id="navbarLinks">
        <a href="/" class="nav-link">INICIO</a>
        <a href="/directorio.html" class="nav-link">DIRECTORIO ANIME</a>
      </div>
      <div class="navbar-search">
        <button class="search-button"><i class="fa-solid fa-search"></i></button>
        <input type="text" class="search-input" placeholder="Buscar...">
      </div>
      <button class="login-btn">LOGIN</button>
    </div>
  </nav>

  <div class="page-container">
    <!-- BREADCRUMB -->
    <div class="breadcrumb">
      <a href="/">Inicio</a> /
      <a href="/directorio.html">Directorio</a> /
      <span id="breadcrumbTitle">Anime</span>
    </div>

    <!-- HEADER -->
    <div class="anime-header">
      <div class="anime-poster">
        <img id="animePoster" src="" alt="" onerror="this.style.display='none'">
      </div>
      <div class="anime-header-info">
        <h1 class="anime-title-main" id="animeTitleMain">Cargando...</h1>
        <span class="anime-type-badge" id="animeTypeBadge">TV</span>
        <p class="anime-synopsis" id="animeSynopsis">Cargando información...</p>
        <div class="anime-meta-row">
          <a href="#" class="anime-action-btn" id="watchFirstBtn">
            <i class="fas fa-play"></i> Ver Episodio 1
          </a>
        </div>
      </div>
    </div>

    <!-- EPISODIOS -->
    <div class="episodes-section">
      <div class="episodes-header">
        <span class="episodes-header-title">▶ EPISODIOS</span>
        <span class="episodes-count" id="episodesCount">0</span>
      </div>
      <div class="episodes-list" id="episodesList">
        <div class="loading">Cargando episodios...</div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div style="max-width: 1150px; margin: 0 auto;">
      <p style="margin-bottom: 12px; color: #ccc;">Anime Online - Ningún vídeo se encuentra alojado en nuestros servidores.</p>
      <div style="display: flex; gap: 20px; justify-content: center; font-size: 12px;">
        <a href="#" style="color: #fff; text-decoration: none;">Términos y Condiciones</a>
        <a href="#" style="color: #fff; text-decoration: none;">Política de Privacidad</a>
        <a href="#" style="color: #fff; text-decoration: none;">Sobre AnimeFLV</a>
      </div>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = 'https://nwvmlgjstsfdlbwzdbsx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53dm1sZ2pzdHNmZGxid3pkYnN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2OTUyNTYsImV4cCI6MjA5NzI3MTI1Nn0.mWSykvxeLxC437SLr4IPhnn2xdZKnHNszvd_7CnvbR8';
    const SUPABASE_HEADERS = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    };

    function supabaseRequest(path, options = {}) {
      const url = `${SUPABASE_URL}/rest/v1${path}`;
      const headers = { ...SUPABASE_HEADERS, ...options.headers };
      return fetch(url, { ...options, headers }).then(r => r.json());
    }

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[^\w\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function getServersForEpisode(ep) {
      if (!ep) return [];
      const linksData = ep.links;
      if (!linksData) return [];
      if (Array.isArray(linksData)) return linksData;
      if (typeof linksData === 'object') {
        return Object.entries(linksData).map(([server, url]) => ({ server_name: server, url }));
      }
      return [];
    }

    async function loadAnimePage() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      if (!slug) {
        alert('Anime no especificado');
        window.location.href = '/directorio.html';
        return;
      }

      try {
        const allAnimes = await supabaseRequest('/animes?select=id,titulo,imagen,descripcion,tipo');
        const anime = allAnimes.find(a => slugify(a.titulo) === slug);

        if (!anime) {
          alert('Anime no encontrado');
          window.location.href = '/directorio.html';
          return;
        }

        // Render header
        document.title = `${anime.titulo} - AnimeFLV`;
        document.getElementById('breadcrumbTitle').textContent = anime.titulo;
        document.getElementById('animeTitleMain').textContent = anime.titulo;
        document.getElementById('animeTypeBadge').textContent = anime.tipo || 'TV';
        document.getElementById('animeSynopsis').textContent = anime.descripcion || 'Sin sinopsis disponible.';

        const poster = document.getElementById('animePoster');
        if (anime.imagen) {
          poster.src = anime.imagen;
        } else {
          poster.style.display = 'none';
        }

        // Cargar episodios
        const episodes = await supabaseRequest(
          `/episodios?anime_id=eq.${anime.id}&select=id,numero,links,cover_image&order=numero.asc`
        );

        document.getElementById('episodesCount').textContent = episodes.length;

        const watchFirstBtn = document.getElementById('watchFirstBtn');
        if (episodes.length > 0) {
          const firstEp = [...episodes].sort((a, b) => a.numero - b.numero)[0];
          watchFirstBtn.href = `/ver/${slug}-${firstEp.numero}`;
          watchFirstBtn.innerHTML = `<i class="fas fa-play"></i> Ver Episodio ${firstEp.numero}`;
        } else {
          watchFirstBtn.style.display = 'none';
        }

        renderEpisodesList(episodes, slug, anime.imagen);
      } catch (err) {
        console.error('Error loading anime page:', err);
        document.getElementById('episodesList').innerHTML = '<div class="episodes-empty">Error al cargar la información</div>';
      }
    }

    function renderEpisodesList(episodes, slug, fallbackCover) {
      const list = document.getElementById('episodesList');

      if (!episodes || episodes.length === 0) {
        list.innerHTML = '<div class="episodes-empty">Aún no hay episodios disponibles para este anime</div>';
        return;
      }

      // M��s reciente primero
      const sorted = [...episodes].sort((a, b) => b.numero - a.numero);

      list.innerHTML = sorted.map(ep => {
        const servers = getServersForEpisode(ep);
        const cover = ep.cover_image || fallbackCover || '';
        return `
          <a href="/ver/${slug}-${ep.numero}" class="episode-row">
            ${cover ? `<img class="episode-row-thumb" src="${cover}" alt="Episodio ${ep.numero}" onerror="this.style.display='none'">` : ''}
            <div class="episode-row-info">
              <div class="episode-row-title">Episodio ${ep.numero}</div>
              <div class="episode-row-sub">${servers.length} servidor${servers.length !== 1 ? 'es' : ''} disponible${servers.length !== 1 ? 's' : ''}</div>
            </div>
            <i class="fas fa-play-circle episode-row-play"></i>
          </a>
        `;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', loadAnimePage);
  </script>
</body>
</html>
